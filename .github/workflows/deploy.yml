name: Deploy Next.js site to Pages

on:
  push:
    branches:
      - newsite
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Setup Pages
        id: setup_pages
        uses: actions/configure-pages@v5


      - name: Clean out/
        run: rm -rf out/


      - name: Build and export Next.js
        run: |
          pnpm run build
          pnpm run export
        env:
          PAGES_BASE_PATH: ${{ steps.setup_pages.outputs.base_path }}


      - name: List out folder
        run: ls -R out
